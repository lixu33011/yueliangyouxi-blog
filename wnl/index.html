<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日历</title>
 <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

/* 动态星空背景画布样式 */
#bg-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.85;
  pointer-events: none;
}

body {
  background: #000; /* 与星空背景融合 */
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}

.calendar {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  width: 100%;
  max-width: 670px;
  margin: 0 auto;
  position: relative;
  z-index: 10; /* 确保日历在背景上方 */
}

.header {
  background: linear-gradient(135deg, #4361ee, #6366f1);
  color: #fff;
  padding: 16px 20px;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
}

.ctrl {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
}

.btn {
  background: rgba(255, 255, 255, 0.2);
  border: none;
  color: #fff;
  padding: 12px 21px;
  border-radius: 22px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.3);
}

.week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  padding: 8px;
  background: #f8f9fc;
}

.week div {
  font-size: 23px;
  color: #64748b;
}

.week .sun {
  color: #ef4444;
}

.week .sat {
  color: #3b82f6;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: #eee;
}

.day {
  background: #fff;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  min-height: 60px;
  padding: 4px;
}

.day.other {
  color: #cbd5e1;
}

.day.today {
  background: #46d413a6 !important;
  color: #580edc !important;
  border-radius: 8px;
  font-weight: bold;
}

.day.sun {
  color: #ef4444;
}

.day.sat {
  color: #3b82f6;
}

.greg {
  font-size: 40px;
}

/* 日期布局：阳历 + 农历 + 节日 */
.date-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}

.gdate {
  font-size: 32px;
  font-weight: bold;
  text-align: center;
}

.ldate-row1 {
  font-size: 20px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 8px;
  color: #666;
}

/* 日视图 */
.day-view {
  padding: 20px;
  text-align: center;
  display: none;
}

.bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  white-space: nowrap;
}

.ldate-row {
  font-size: 28px;
  color: #848;
  flex: 1;
  text-align: center;
}

.festival-tip {
  font-size: 26px;
  color: #d81b1b;
  font-weight: bold;
  text-align: right;
  white-space: nowrap;
}

.gdate-center {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
}

.festival-term-row {
  margin-bottom: 15px;
  color: #c72323;
  font-weight: bold;
}

.lun {
  font-size: 17px;
  color: #666;
  margin-top: 0px;
}

.gz {
  font-size: 13px;
  color: #7c4dff;
  margin-top: 0px;
  white-space: nowrap;
}

.festival {
  position: absolute;
  top: 2px;
  right: 2px;
  font-size: 11px;
  color: #f97316;
}

.term {
  position: absolute;
  top: 2px;
  left: 2px;
  font-size: 11px;
  color: #10b983;
}

.hl-box {
  margin-top: 18px;
  padding: 14px;
  background: #f8f9fc;
  border-radius: 12px;
  text-align: left;
  font-size: 20px;
  line-height: 1.7;
}

.hl-title {
  font-weight: bold;
  color: #4361ee;
  margin-bottom: 28px;
}

.hl-line {
  display: flex;
  margin: 4px 0;
}

.hl-label {
  width: 60px;
  color: #666;
}

.hl-content {
  flex: 1;
  color: #333;
}

.year-view {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 15px;
  display: none;
}

.year-month {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 8px;
  text-align: center;
}

.year-month-title {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 6px;
  color: #4361ee;
}

.year-month-week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  font-size: 9px;
}

.year-month-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  font-size: 11px;
}

// 直接内置星空背景，无需外部文件
function initBg() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let width = window.innerWidth;
  let height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;

  const stars = [];
  for (let i = 0; i < 600; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: Math.random() * 2.5,
      speed: Math.random() * 0.5 + 0.2,
      color: `rgb(${Math.random() * 150 + 100},${Math.random() * 150 + 100},${Math.random() * 255})`
    });
  }

  function animate() {
    requestAnimationFrame(animate);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, width, height);
    stars.forEach(star => {
      star.y += star.speed;
      if (star.y > height) star.y = 0;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      ctx.fillStyle = star.color;
      ctx.fill();
    });
  }
  animate();

  window.addEventListener('resize', () => {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  });
}

// 页面加载自动运行
window.addEventListener('DOMContentLoaded', () => {
  initBg();
});

// 天干地支
const GAN  = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const ZHI  = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

// 二十四节气（节 / 气）
const JIE = ["立春","惊蛰","清明","立夏","芒种","小暑","立秋","白露","寒露","立冬","大雪","小寒"];
const QI  = ["雨水","春分","谷雨","小满","夏至","大暑","处暑","秋分","霜降","小雪","冬至","大寒"];
const ALL_TERM = [...JIE, ...QI];
const M_ZHI = ["寅","卯","辰","巳","午","未","申","酉","戌","亥","子","丑"];

// 节气缓存
const termCache = new Map();
function getTermMap(y) {
  if (termCache.has(y)) return termCache.get(y);
  const map = {};
  const C = {
    "立春":3.87,"雨水":18.73,"惊蛰":5.63,"春分":20.64,
    "清明":4.81,"谷雨":20.1,"立夏":5.52,"小满":21.04,
    "芒种":5.678,"夏至":21.37,"小暑":6.509,"大暑":22.83,
    "立秋":7.5,"处暑":23.43,"白露":7.646,"秋分":23.04,
    "寒露":8.318,"霜降":23.43,"立冬":7.438,"小雪":22.36,
    "大雪":7.18,"冬至":21.94,"小寒":5.88,"大寒":20.14
  };
  const monthMap = {
    "立春":2,"雨水":2,"惊蛰":3,"春分":3,"清明":4,"谷雨":4,
    "立夏":5,"小满":5,"芒种":6,"夏至":6,"小暑":7,"大暑":7,
    "立秋":8,"处暑":8,"白露":9,"秋分":9,"寒露":10,"霜降":10,
    "立冬":11,"小雪":11,"大雪":12,"冬至":12,"小寒":1,"大寒":1
  };
  const Y = y % 100;
  for (const n of ALL_TERM) {
    const m = monthMap[n];
    const lp = Math.floor((["小寒","大寒","立春","雨水"].includes(n) ? Y - 1 : Y) / 4);
    let d = Math.floor(Y * 0.2422 + C[n]) - lp;
    if (y === 2027 && n === "小寒") d = 5;
    map[`${y}-${m}-${d}`] = n;
  }
  termCache.set(y, map);
  return map;
}

function getTerm(date) {
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  const k = `${y}-${m}-${d}`;
  const t = {...getTermMap(y-1), ...getTermMap(y), ...getTermMap(y+1)};
  return t[k] || "";
}

// 年干支（以春节为界）
function getYearGZ(date) {
  const lunar = getLunarDate(date);
  const ly = lunar.year;
  return GAN[(ly - 4) % 10] + ZHI[(ly - 4) % 12];
}
// =========================
// ✅ 干支历年干（以【立春】为界，仅用于推算月干）
// =========================
function getYearGZForMonth(date) {
  const y = date.getFullYear();
  // 找到当年立春
  const termMap = getTermMap(y);
  const lcKeys = Object.keys(termMap).filter(k => termMap[k] === '立春');
  const lc = lcKeys.length ? new Date(lcKeys[0]) : new Date(y, 1, 4); // 默认2月4日
  
  // 立春前：用上一年干支
  if (date < lc) {
    return GAN[(y - 1 - 4) % 10] + ZHI[(y - 1 - 4) % 12];
  } else {
    return GAN[(y - 4) % 10] + ZHI[(y - 4) % 12];
  }
}
// =========================
// ✅ 月干支（按节气，用干支历年干推算）
// =========================
function getMonthGZ(date) {
  // 关键修复：月干必须用【立春为界】的年干
  const yearGZ = getYearGZForMonth(date);
  const yearGan = yearGZ[0];
  const y = date.getFullYear();
  const termMap = { ...getTermMap(y-1), ...getTermMap(y), ...getTermMap(y+1) };
  
  // 只取【节】用于月份划分
  const jieKeys = Object.keys(termMap)
    .filter(k => JIE.includes(termMap[k]))
    .sort((a,b) => new Date(a)-new Date(b));

  let idx = 0;
  for (const k of jieKeys) {
    const n = termMap[k];
    const i = JIE.indexOf(n);
    const [ty, tt, td] = k.split("-").map(Number);
    if (date >= new Date(ty, tt-1, td)) idx = i;
  }

  const hu = {
    "甲":2, "乙":4, "丙":6, "丁":8, "戊":0,
    "己":2, "庚":4, "辛":6, "壬":8, "癸":0
  };
  const g = (hu[yearGan] + idx) % 10;
  return GAN[g] + M_ZHI[idx % 12];
}
// 日干支
function getDayGZ(date) {
  const base = new Date(Date.UTC(1900, 0, 1));
  const target = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const days = Math.floor((target - base) / 86400000);
  const idx = (days + 10) % 60;
  return GAN[idx % 10] + ZHI[idx % 12];
}

// 农历转换
function getLunarDate(date){
  const lunarInfo=[0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0];
  const n1=['日','一','二','三','四','五','六','七','八','九','十'];
  const n2=['初','十','廿','卅'];
  const n3=['正','二','三','四','五','六','七','八','九','十','冬','腊'];
  let y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  
  function getLunarYearDays(year){
    let sum=348;
    for(let i=0x8000;i>0x8;i>>=1) sum+=(lunarInfo[year-1900]&i)?1:0;
    return sum+getLeapMonthDays(year);
  }
  function getLeapMonth(year){ return lunarInfo[year-1900]&0xf; }
  function getLeapMonthDays(year){
    let lm=getLeapMonth(year);
    return lm ? (lunarInfo[year-1900]&0x10000 ? 30 : 29) : 0;
  }
  function getLunarMonthDays(year,month){
    return lunarInfo[year-1900]&(0x10000>>month) ? 30 : 29;
  }

  let offset=(Date.UTC(y,m-1,d)-Date.UTC(1900,0,31))/86400000;
  let i,temp,ly,lm,ld,leap=0;
  for(i=1900;i<2100&&offset>0;i++){ temp=getLunarYearDays(i); offset-=temp; }
  if(offset<0){ offset+=temp; i--; }
  ly=i; leap=getLeapMonth(ly); let isLeap=false;
  for(i=1;i<13&&offset>0;i++){
    if(leap>0&&i==leap+1&&!isLeap){ i--; isLeap=true; temp=getLeapMonthDays(ly); }
    else temp=getLunarMonthDays(ly,i);
    offset-=temp;
    if(isLeap&&i==leap+1) isLeap=false;
  }
  if(offset<0){ offset+=temp; i--; }
  lm=i; ld=offset+1;
  
  let ms=n3[lm-1]+'月';
  let ds;
  if(ld==10)ds='初十';
  else if(ld==20)ds='二十';
  else if(ld==30)ds='三十';
  else ds=n2[~~(ld/10)]+n1[ld%10];
  return {year:ly,month:lm,day:ld,text:ms+ds};
}


// 公历 + 农历节日
function getFestival(date) {
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const lunar = getLunarDate(date);
  const lm = lunar.month;
  const ld = lunar.day;

  // 公历节日
  if (m === 1 && d === 1) return "元旦";
  if (m === 3 && d === 8) return "妇女节";
  if (m === 3 && d === 12) return "植树节";
  if (m === 5 && d === 1) return "劳动节";
  if (m === 5 && d === 4) return "青年节";
  if (m === 6 && d === 1) return "儿童节";
  if (m === 7 && d === 1) return "建党节";
  if (m === 8 && d === 1) return "建军节";
  if (m === 9 && d === 10) return "教师节";
  if (m === 10 && d === 1) return "国庆节";

  // 农历节日
  if (lm === 1 && ld === 1) return "春节";
  if (lm === 1 && ld === 15) return "元宵节";
  if (lm === 2 && ld === 2) return "龙抬头";
  if (lm === 5 && ld === 5) return "端午节";
  if (lm === 7 && ld === 7) return "七夕节";
  if (lm === 7 && ld === 15) return "中元节";
  if (lm === 8 && ld === 15) return "中秋节";
  if (lm === 9 && ld === 9) return "重阳节";
  if (lm === 12 && ld === 8) return "腊八节";
  if (lm === 12 && ld === 23) return "小年";
  if (lm === 12 && ld === new Date(y, m - 1, 0).getDate()) return "除夕";

  return "";
}

const $yearView = document.getElementById('yearView');
const $dayDetail = document.getElementById('dayDetail');
const $backBtn = document.getElementById('backBtn');
const $prev = document.getElementById('prev');
const $next = document.getElementById('next');
const $monthWeek = document.getElementById('monthWeek');
const $hlBox = document.getElementById('hlBox');

// ===================== 修复 1：补充你缺失的 2 个核心函数 =====================
// 显示月视图
function showMonth() {
  view = 'month';
  $yearView.style.display = 'none';
  $monthWeek.style.display = 'grid';
  $days.style.display = 'grid';
  $dayDetail.style.display = 'none';
  $backBtn.style.display = 'inline-block'; // 显示返回
  renderMonthWeek(); // 渲染星期头部
  renderMonth();
}

// 渲染月视图
function renderMonth() {
  $days.innerHTML = '';
  $ym.textContent = cur.getFullYear() + '年' + (cur.getMonth() + 1) + '月';

  const firstDay = new Date(cur.getFullYear(), cur.getMonth(), 1);
  const lastDay = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
  const firstWeekDay = firstDay.getDay();

  // 上月空白填充
  for (let i = 0; i < firstWeekDay; i++) {
    $days.appendChild(addDay(null, true));
  }

  // 当月日期
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const day = new Date(cur.getFullYear(), cur.getMonth(), d);
    $days.appendChild(addDay(day, false));
  }

  // 下月空白填充到 6*7=42 格
  const total = $days.children.length;
  for (let i = total; i < 42; i++) {
    $days.appendChild(addDay(null, true));
  }
}

// 渲染星期头部（日一二三四五六）
function renderMonthWeek() {
  const week = ['日', '一', '二', '三', '四', '五', '六'];
  $monthWeek.innerHTML = '';
  week.forEach((name, i) => {
    const el = document.createElement('div');
    el.textContent = name;
    el.className = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
    $monthWeek.appendChild(el);
  });
}
// ==========================================================================

// 按钮事件
$backBtn.onclick = () => view === 'day' ? showMonth() : showYear();
$prev.onclick = () => {
  if (view === 'year') { cur.setFullYear(cur.getFullYear() - 1); showYear(); }
  else if (view === 'month') { cur.setMonth(cur.getMonth() - 1); renderMonth(); }
  else { sel.setDate(sel.getDate() - 1); showDay(); }
};
$next.onclick = () => {
  if (view === 'year') { cur.setFullYear(cur.getFullYear() + 1); showYear(); }
  else if (view === 'month') { cur.setMonth(cur.getMonth() + 1); renderMonth(); }
  else { sel.setDate(sel.getDate() + 1); showDay(); }
};

// 日期单元格渲染
function addDay(date, other) {
  // 修复 2：空日期安全处理
  if (!date || !(date instanceof Date) || isNaN(date.getTime())) {
    const el = document.createElement('div');
    el.className = 'day other';
    return el;
  }

  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const w = date.getDay();

  let lunar = { text: '' };
  try { lunar = getLunarDate(date); } catch (e) {}

  let term = '';
  try { term = getTerm(date); } catch (e) {}

  let fest = '';
  try { fest = getFestival(date); } catch (e) {}

  let yearGZ = '', monthGZ = '', dayGZ = '';
  try {
    yearGZ = getYearGZ(date);
    monthGZ = getMonthGZ(date);
    dayGZ = getDayGZ(date);
  } catch (e) {}

  const el = document.createElement('div');
  el.className = 'day';
  if (other) el.classList.add('other');
  if (w === 0) el.classList.add('sun');
  if (w === 6) el.classList.add('sat');

  const today = new Date();
  if (date.toDateString() === today.toDateString()) {
    el.classList.add('today');
  }

  el.innerHTML = `
    <div class="greg">${d}</div>
    <div class="lun">${lunar.text || ''}</div>
    <div class="gz">${yearGZ} ${monthGZ} ${dayGZ}</div>
    ${fest ? `<div class="festival">${fest}</div>` : ''}
    ${term ? `<div class="term">${term}</div>` : ''}
  `;

  el.onclick = () => { sel = new Date(date); showDay(); };
  return el;
}

// 年视图
function showYear() {
  view = 'year';
  $yearView.style.display = 'grid';
  $monthWeek.style.display = 'none';
  $days.style.display = 'none';
  $dayDetail.style.display = 'none';
  $backBtn.style.display = 'none'; // 年视图必须隐藏
  $ym.textContent = cur.getFullYear() + '年';
  renderYear();
}

function renderYear() {
  $yearView.innerHTML = '';
  const wk = ['日', '一', '二', '三', '四', '五', '六'];
  const y = cur.getFullYear();
  for (let m = 0; m < 12; m++) {
    const b = document.createElement('div');
    b.className = 'year-month';
    const t = document.createElement('div');
    t.className = 'year-month-title';
    t.textContent = (m + 1) + '月';
    b.appendChild(t);
    const wb = document.createElement('div');
    wb.className = 'year-month-week';
    wk.forEach((s, i) => {
      const d = document.createElement('div');
      d.textContent = s;
      if (i === 0) d.className = 'sun';
      if (i === 6) d.className = 'sat';
      wb.appendChild(d);
    });
    b.appendChild(wb);
    const db = document.createElement('div');
    db.className = 'year-month-days';
    const f = new Date(y, m, 1);
    const wd = f.getDay();
    for (let i = 0; i < wd; i++) db.appendChild(document.createElement('div'));
    const l = new Date(y, m + 1, 0).getDate();
    for (let d = 1; d <= l; d++) {
      const c = document.createElement('div');
      c.textContent = d;
      const w = new Date(y, m, d).getDay();
      if (w === 0) c.className = 'sun';
      if (w === 6) c.className = 'sat';
      c.onclick = () => { cur = new Date(y, m, d); showMonth(); };
      db.appendChild(c);
    }
    b.appendChild(db);
    $yearView.appendChild(b);
  }
}

// 日详情视图
// 日详情视图 — 农历居中，节日节气居右
function showDay() {
  view = 'day';
  $yearView.style.display = 'none';
  $monthWeek.style.display = 'none';
  $days.style.display = 'none';
  $dayDetail.style.display = 'block';
  $backBtn.style.display = 'inline-block';

  const y = sel.getFullYear();
  const m = sel.getMonth() + 1;
  const d = sel.getDate();
  const w = ['日', '一', '二', '三', '四', '五', '六'][sel.getDay()];
  const lunar = getLunarDate(sel);
  const term = getTerm(sel) || '';
  const fest = (typeof getFestival === 'function' ? getFestival(sel) : '') || '';

  const yearGZ = getYearGZ(sel);
  const monthGZ = getMonthGZ(sel);
  const dayGZ = getDayGZ(sel);

  // 公历 + 星期
  const $g = document.getElementById('g');
  if ($g) {
    $g.textContent = `${y}年${m}月${d}日 星期${w}`;
  }

  // 节日 + 节气 居右显示
  const $festival = document.getElementById('festivalTip');
  if ($festival) {
    let tip = '';
    if (fest) tip += fest;
    if (term) tip += (tip ? ' ' : '') + term;
    $festival.textContent = tip;
  }

  // 农历（带干支年）居中显示
  const $l = document.getElementById('l');
  if ($l) {
  $l.textContent = `农历 ${getChineseYear(lunar.year)}年${lunar.text}`;
  }
// 公历年份 → 中文大写（如 2026 → 二零二六）

  // 黄历
  $hlBox.innerHTML = `
    <div class="hl-title">干支</div>
    <div class="hl-line"><span class="hl-label">年</span><span class="hl-content">${yearGZ}</span></div>
    <div class="hl-line"><span class="hl-label">月</span><span class="hl-content">${monthGZ}</span></div>
    <div class="hl-line"><span class="hl-label">日</span><span class="hl-content">${dayGZ}</span></div>
  `;
}

function getChineseYear(year) {
  const map = ['零','一','二','三','四','五','六','七','八','九'];
  return String(year).split('').map(n => map[n]).join('');
}
// 初始化（现在不会报错了）
showMonth();
</script> 


</body>
</html>
